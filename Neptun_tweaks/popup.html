<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 240px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 15px;
      background-color: #f9f9f9;
      color: #333;
      margin: 0;
    }
    h3 {
      margin-top: 0;
      margin-bottom: 15px;
      font-size: 16px;
      text-align: center;
      border-bottom: 2px solid #0056b3;
      padding-bottom: 8px;
    }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 14px;
    }
    
    .url-input {
      width: 100%;
      box-sizing: border-box;
      padding: 6px;
      font-size: 11px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .url-input:disabled {
      background-color: #e9e9e9;
      color: #999;
    }
    .note {
      font-size: 11px;
      color: #777;
      text-align: center;
      margin-top: 15px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <h3>Neptun Tweaks</h3>

  <div class="toggle-row">
    <label for="bgToggle">Custom Dashboard Background</label>
    <input type="checkbox" id="bgToggle">
  </div>
  <input type="text" id="bgUrlInput" class="url-input" placeholder="Paste image URL here...">

  <div class="toggle-row">
    <label for="homeToggle">Auto-Expand Dashboard</label>
    <input type="checkbox" id="homeToggle">
  </div>

  <div class="toggle-row">
    <label for="listToggle">Auto-Expand Lists</label>
    <input type="checkbox" id="listToggle">
  </div>

  <div class="note">Refresh Neptun to apply changes.</div>

  <script src="popup.js"></script>
</body>
</html>
